# ──────────────────────────────────────────────────────────────────────────────
# PROFILE: prod (Railway / produção)
# Ativado automaticamente pelo Railway via variável de ambiente:
#   SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────────────────────────────────────

# ── Banco de dados (Railway injeta essas variáveis automaticamente) ────────────
spring.datasource.url=${MYSQLDATABASE_URL}
spring.datasource.username=${MYSQLDATABASE_USER}
spring.datasource.password=${MYSQLDATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões — mantém o banco vivo sem hibernar
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Servidor ───────────────────────────────────────────────────────────────────
# Railway injeta PORT automaticamente
server.port=${PORT:8080}

# ── CORS ───────────────────────────────────────────────────────────────────────
# Configure no painel do Railway: CORS_ALLOWED_ORIGINS=https://seu-front.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Email (SendGrid HTTP API) ──────────────────────────────────────────────────
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_FROM_EMAIL:jorgeafigueredo2@gmail.com}
sendgrid.from.name=Sistema Senac