spring.application.name=apigenatvdcomplementares

# ── Profile ativo ──────────────────────────────────────────────────────────────
# "local"  → usa application-local.properties  (desenvolvimento)
# "prod"   → usa application-prod.properties   (Railway / produção)
# Para trocar, altere aqui OU passe como argumento:
#   java -jar app.jar --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}